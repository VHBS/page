<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efeito Scroll 3D Grid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ======= CUBO DE GRADE ======= */
    body {
      background: black;
      color: white;
      margin: 0;
      min-height: 300vh;
      /* cria rolagem para testar o efeito */
      overflow-x: hidden;
    }

    .perspective {
      position: fixed;
      inset: 0;
      z-index: -1;
      perspective: 800px;
    }

    .cube {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.1s linear;
    }

    .side {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(#ffffff22 1px,
          transparent 2px,
          transparent 40px),
        repeating-linear-gradient(90deg,
          #ffffff22 1px,
          transparent 2px,
          transparent 40px);
      background-size: 40px 40px;
      border: 1px solid #ffffff22;
    }

    .front {
      transform: translateZ(200px);
    }

    .back {
      transform: rotateY(180deg) translateZ(200px);
    }

    .right {
      transform: rotateY(90deg) translateZ(200px);
    }

    .left {
      transform: rotateY(-90deg) translateZ(200px);
    }

    .top {
      transform: rotateX(90deg) translateZ(200px);
    }

    .bottom {
      transform: rotateX(-90deg) translateZ(200px);
    }

    /* ======= CONTEÚDO ======= */
    section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <!-- Fundo 3D fixo -->
  <div class="perspective">
    <div class="cube" id="cube">
      <div class="side front"></div>
      <div class="side back"></div>
      <div class="side left"></div>
      <div class="side right"></div>
      <div class="side top"></div>
      <div class="side bottom"></div>
    </div>
  </div>

  <!-- Conteúdo para rolar -->
  <section>Início</section>
  <section>Sobre</section>
  <section>Projetos</section>
  <section>Contato</section>

  <script>
    const cube = document.getElementById("cube");

    window.addEventListener("scroll", () => {
      const scrollTop = window.scrollY;
      const rotateX = scrollTop * 0.1;
      const rotateY = scrollTop * 0.2;
      cube.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
  </script>
</body>

</html>
